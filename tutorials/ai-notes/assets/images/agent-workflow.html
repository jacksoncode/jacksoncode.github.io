<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent工作流程</title>
  <style>
    :root {
      --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
      --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
      --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
      --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
      --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --purple-50: #3C3489; --purple-600: #CECBF6; --purple-800: #EEEDFE;
        --teal-50: #085041; --teal-600: #9FE1CB; --teal-800: #E1F5EE;
        --coral-50: #712B13; --coral-600: #F5C4B3; --coral-800: #FAECE7;
        --gray-50: #444441; --gray-600: #D3D1C7; --gray-800: #F1EFE8;
        --blue-50: #0C447C; --blue-600: #B5D4F4; --blue-800: #E6F1FB;
      }
    }
    body { margin: 0; padding: 20px; background: var(--gray-50); font-family: Inter, system-ui, sans-serif; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; color: var(--gray-800); margin: 0 0 8px 0; }
    h2 { font-size: 14px; font-weight: 400; color: var(--gray-600); margin: 0 0 20px 0; }
    svg { display: block; }
    .th { font-size: 14px; font-weight: 500; fill: var(--gray-800); }
    .ts { font-size: 12px; font-weight: 400; fill: var(--gray-600); }
    .arr { stroke: var(--gray-600); stroke-width: 1.5; fill: none; }
    .arr-loop { stroke: var(--teal-600); stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
    .node-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
    .node-purple text { fill: var(--purple-800); }
    .node-teal rect { fill: var(--teal-50); stroke: var(--teal-600); }
    .node-teal text { fill: var(--teal-800); }
    .node-gray rect { fill: var(--gray-50); stroke: var(--gray-600); }
    .node-gray text { fill: var(--gray-800); }
    .node-coral rect { fill: var(--coral-50); stroke: var(--coral-600); }
    .node-coral text { fill:var(--coral-800); }
    .node-blue rect { fill: var(--blue-50); stroke: var(--blue-600); }
    .node-blue text { fill: var(--blue-800); }
    .step-num { fill: var(--purple-800); font-size: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent工作流程</h1>
    <h2>从感知到行动的完整执行循环</h2>
    <svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      
      <g class="node-gray">
        <rect x="40" y="40" width="100" height="50" rx="8" stroke-width="0.5"/>
        <circle cx="55" cy="55" r="12" fill="var(--purple-600)"/>
        <text class="step-num" x="55" y="55" text-anchor="middle" dominant-baseline="central">1</text>
        <text class="th" x="90" y="65" text-anchor="middle" dominant-baseline="central">接收输入</text>
      </g>
      
      <g class="node-purple">
        <rect x="160" y="40" width="100" height="50" rx="8" stroke-width="0.5"/>
        <circle cx="175" cy="55" r="12" fill="var(--purple-600)"/>
        <text class="step-num" x="175" y="55" text-anchor="middle" dominant-baseline="central">2</text>
        <text class="th" x="210" y="65" text-anchor="middle" dominant-baseline="central">理解任务</text>
      </g>
      
      <g class="node-teal">
        <rect x="280" y="40" width="100" height="50" rx="8" stroke-width="0.5"/>
        <circle cx="295" cy="55" r="12" fill="var(--teal-600)"/>
        <text class="step-num" x="295" y="55" text-anchor="middle" dominant-baseline="central" fill="white">3</text>
        <text class="th" x="330" y="65" text-anchor="middle" dominant-baseline="central">制定计划</text>
      </g>
      
      <g class="node-coral">
        <rect x="400" y="40" width="100" height="50" rx="8" stroke-width="0.5"/>
        <circle cx="415" cy="55" r="12" fill="var(--coral-600)"/>
        <text class="step-num" x="415" y="55" text-anchor="middle" dominant-baseline="central" fill="white">4</text>
        <text class="th" x="450" y="65" text-anchor="middle" dominant-baseline="central">执行行动</text>
      </g>
      
      <g class="node-blue">
        <rect x="520" y="40" width="100" height="50" rx="8" stroke-width="0.5"/>
        <circle cx="535" cy="55" r="12" fill="var(--blue-600)"/>
        <text class="step-num" x="535" y="55" text-anchor="middle" dominant-baseline="central" fill="white">5</text>
        <text class="th" x="570" y="65" text-anchor="middle" dominant-baseline="central">获取反馈</text>
      </g>
      
      <line x1="140" y1="65" x2="160" y2="65" class="arr" marker-end="url(#arrow)"/>
      <line x1="260" y1="65" x2="280" y2="65" class="arr" marker-end="url(#arrow)"/>
      <line x1="380" y1="65" x2="400" y2="65" class="arr" marker-end="url(#arrow)"/>
      <line x1="500" y1="65" x2="520" y2="65" class="arr" marker-end="url(#arrow)"/>
      
      <path d="M570 90 Q590 120 570 150 Q550 180 330 180 Q110 180 90 150 Q70 120 90 90" class="arr-loop" marker-end="url(#arrow-teal)" fill="none"/>
      
      <g class="node-gray">
        <rect x="280" y="160" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="330" y="182" text-anchor="middle" dominant-baseline="central">更新记忆</text>
      </g>
      
      <line x1="570" y1="90" x2="330" y2="160" class="arr" marker-end="url(#arrow)"/>
      
      <text class="ts" x="620" y="140" text-anchor="start" dominant-baseline="central" fill="var(--teal-600)">迭代循环</text>
      <text class="ts" x="570" y="100" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">观察结果</text>
      <text class="ts" x="330" y="210" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">存储经验</text>
      
      <rect x="40" y="240" width="580" height="30" rx="6" fill="var(--gray-50)" stroke="var(--gray-600)" stroke-width="0.5"/>
      <text class="ts" x="340" y="255" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">循环直到任务完成或达到终止条件</text>
    </svg>
  </div>
</body>
</html>
