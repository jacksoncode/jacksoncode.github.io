<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP协议架构</title>
  <style>
    :root {
      --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
      --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
      --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
      --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
      --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --purple-50: #3C3489; --purple-600: #CECBF6; --purple-800: #EEEDFE;
        --teal-50: #085041; --teal-600: #9FE1CB; --teal-800: #E1F5EE;
        --coral-50: #712B13; --coral-600: #F5C4B3; --coral-800: #FAECE7;
        --gray-50: #444441; --gray-600: #D3D1C7; --gray-800: #F1EFE8;
        --blue-50: #0C447C; --blue-600: #B5D4F4; --blue-800: #E6F1FB;
      }
    }
    body { margin: 0; padding: 20px; background: var(--gray-50); font-family: Inter, system-ui, sans-serif; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; color: var(--gray-800); margin: 0 0 8px 0; }
    h2 { font-size: 14px; font-weight: 400; color: var(--gray-600); margin: 0 0 20px 0; }
    svg { display: block; }
    .th { font-size: 14px; font-weight: 500; fill: var(--gray-800); }
    .ts { font-size: 12px; font-weight: 400; fill: var(--gray-600); }
    .arr { stroke: var(--gray-600); stroke-width: 1.5; fill: none; }
    .arr-bidi { stroke: var(--purple-600); stroke-width: 1.5; fill: none; }
    .node-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
    .node-purple text { fill: var(--purple-800); }
    .node-teal rect { fill: var(--teal-50); stroke: var(--teal-600); }
    .node-teal text { fill: var(--teal-800); }
    .node-gray rect { fill: var(--gray-50); stroke: var(--gray-600); }
    .node-gray text { fill: var(--gray-800); }
    .node-coral rect { fill: var(--coral-50); stroke: var(--coral-600); }
    .node-coral text { fill: var(--coral-800); }
    .node-blue rect { fill: var(--blue-50); stroke: var(--blue-600); }
    .node-blue text { fill: var(--blue-800); }
    .layer-label { fill: var(--gray-600); font-size: 11px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCP协议架构</h1>
    <h2>模型上下文协议的三层结构</h2>
    <svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-bidi" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      
      <text class="layer-label" x="40" y="50" dominant-baseline="central">宿主层</text>
      <g class="node-purple">
        <rect x="80" y="40" width="180" height="50" rx="10" stroke-width="0.5"/>
        <text class="th" x="170" y="65" text-anchor="middle" dominant-baseline="central">MCP Host</text>
      </g>
      <text class="ts" x="170" y="95" text-anchor="middle" dominant-baseline="central">Claude / IDE / 应用</text>
      
      <text class="layer-label" x="40" y="150" dominant-baseline="central">协议层</text>
      <g class="node-teal">
        <rect x="80" y="140" width="180" height="50" rx="10" stroke-width="0.5"/>
        <text class="th" x="170" y="165" text-anchor="middle" dominant-baseline="central">MCP Client</text>
      </g>
      <text class="ts" x="170" y="195" text-anchor="middle" dominant-baseline="central">协议连接管理</text>
      
      <g class="node-blue">
        <rect x="420" y="140" width="180" height="50" rx="10" stroke-width="0.5"/>
        <text class="th" x="510" y="165" text-anchor="middle" dominant-baseline="central">MCP Server</text>
      </g>
      <text class="ts" x="510" y="195" text-anchor="middle" dominant-baseline="central">资源/工具/提示</text>
      
      <text class="layer-label" x="40" y="250" dominant-baseline="central">资源层</text>
      <g class="node-coral">
        <rect x="420" y="240" width="180" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="510" y="262" text-anchor="middle" dominant-baseline="central">外部资源</text>
      </g>
      <text class="ts" x="510" y="285" text-anchor="middle" dominant-baseline="central">文件/API/数据库</text>
      
      <line x1="170" y1="90" x2="170" y2="140" class="arr" marker-end="url(#arrow)"/>
      
      <g>
        <line x1="260" y1="165" x2="420" y2="165" class="arr-bidi"/>
        <text class="ts" x="340" y="155" text-anchor="middle" dominant-baseline="central" fill="var(--purple-600)">JSON-RPC</text>
      </g>
      
      <line x1="510" y1="190" x2="510" y2="240" class="arr" marker-end="url(#arrow)"/>
      
      <g class="node-gray">
        <rect x="300" y="240" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="350" y="262" text-anchor="middle" dominant-baseline="central">Prompts</text>
      </g>
      <g class="node-gray">
        <rect x="300" y="140" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="350" y="162" text-anchor="middle" dominant-baseline="central">Tools</text>
      </g>
      
      <text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">核心能力</text>
      <text class="ts" x="340" y="285" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">模板定义</text>
    </svg>
  </div>
</body>
</html>
