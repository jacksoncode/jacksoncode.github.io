<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLIP对比学习原理</title>
  <style>
    :root {
      --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
      --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
      --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
      --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
      --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --purple-50: #3C3489; --purple-600: #CECBF6; --purple-800: #EEEDFE;
        --teal-50: #085041; --teal-600: #9FE1CB; --teal-800: #E1F5EE;
        --coral-50: #712B13; --coral-600: #F5C4B3; --coral-800: #FAECE7;
        --gray-50: #444441; --gray-600: #D3D1C7; --gray-800: #F1EFE8;
        --blue-50: #0C447C; --blue-600: #B5D4F4; --blue-800: #E6F1FB;
      }
    }
    body { margin: 0; padding: 20px; background: var(--gray-50); font-family: Inter, system-ui, sans-serif; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; color: var(--gray-800); margin: 0 0 8px 0; }
    h2 { font-size: 14px; font-weight: 400; color: var(--gray-600); margin: 0 0 20px 0; }
    svg { display: block; }
    .th { font-size: 14px; font-weight: 500; fill: var(--gray-800); }
    .ts { font-size: 12px; font-weight: 400; fill: var(--gray-600); }
    .arr { stroke: var(--gray-600); stroke-width: 1.5; fill: none; }
    .arr-match { stroke: var(--teal-600); stroke-width: 2; fill: none; }
    .arr-nomatch { stroke: var(--coral-600); stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
    .node-teal rect { fill: var(--teal-50); stroke: var(--teal-600); }
    .node-teal text { fill: var(--teal-800); }
    .node-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
    .node-purple text { fill: var(--purple-800); }
    .node-gray rect { fill: var(--gray-50); stroke: var(--gray-600); }
    .node-gray text { fill: var(--gray-800); }
    .node-coral rect { fill: var(--coral-50); stroke: var(--coral-600); }
    .node-coral text { fill: var(--coral-800); }
    .node-blue rect { fill: var(--blue-50); stroke: var(--blue-600); }
    .node-blue text { fill: var(--blue-800); }
  </style>
</head>
<body>
  <div class="container">
    <h1>CLIP对比学习原理</h1>
    <h2>图像-文本对齐训练过程</h2>
    <svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      
      <g class="node-gray">
        <rect x="40" y="40" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="100" y="62" text-anchor="middle" dominant-baseline="central">图像 batch</text>
      </g>
      <g class="node-gray">
        <rect x="520" y="40" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="580" y="62" text-anchor="middle" dominant-baseline="central">文本 batch</text>
      </g>
      
      <g class="node-teal">
        <rect x="40" y="100" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="100" y="122" text-anchor="middle" dominant-baseline="central">Image Encoder</text>
      </g>
      <g class="node-purple">
        <rect x="520" y="100" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="580" y="122" text-anchor="middle" dominant-baseline="central">Text Encoder</text>
      </g>
      
      <g class="node-coral">
        <rect x="40" y="160" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="100" y="182" text-anchor="middle" dominant-baseline="central">I₁ I₂ I₃ ...</text>
      </g>
      <g class="node-coral">
        <rect x="520" y="160" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="580" y="182" text-anchor="middle" dominant-baseline="central">T₁ T₂ T₃ ...</text>
      </g>
      
      <g class="node-blue">
        <rect x="240" y="160" width="200" height="56" rx="12" stroke-width="0.5"/>
        <text class="th" x="340" y="180" text-anchor="middle" dominant-baseline="central">对比损失计算</text>
        <text class="ts" x="340" y="198" text-anchor="middle" dominant-baseline="central">最大化匹配对相似度</text>
      </g>
      
      <line x1="100" y1="84" x2="100" y2="100" class="arr" marker-end="url(#arrow)"/>
      <line x1="580" y1="84" x2="580" y2="100" class="arr" marker-end="url(#arrow)"/>
      <line x1="100" y1="144" x2="100" y2="160" class="arr" marker-end="url(#arrow)"/>
      <line x1="580" y1="144" x2="580" y2="160" class="arr" marker-end="url(#arrow)"/>
      
      <path d="M160 182 L240 188" class="arr" marker-end="url(#arrow)"/>
      <path d="M520 182 L440 188" class="arr" marker-end="url(#arrow)"/>
      
      <g transform="translate(240, 230)">
        <rect x="0" y="0" width="80" height="30" rx="6" fill="var(--teal-50)" stroke="var(--teal-600)" stroke-width="0.5"/>
        <text class="ts" x="40" y="15" text-anchor="middle" dominant-baseline="central" fill="var(--teal-800)">匹配 ✓</text>
      </g>
      <g transform="translate(340, 230)">
        <rect x="0" y="0" width="80" height="30" rx="6" fill="var(--coral-50)" stroke="var(--coral-600)" stroke-width="0.5"/>
        <text class="ts" x="40" y="15" text-anchor="middle" dominant-baseline="central" fill="var(--coral-800)">不匹配 ✗</text>
      </g>
      
      <text class="ts" x="100" y="260" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">N×N 相似度矩阵</text>
      <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central" fill="var(--gray-600)">I₁→T₁, I₂→T₂ 对齐最大化</text>
    </svg>
  </div>
</body>
</html>
