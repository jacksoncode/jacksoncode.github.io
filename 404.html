<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="页面未找到 - CodeClub">
    <meta name="robots" content="noindex, nofollow">
    <title>页面未找到 - 404 | CodeClub</title>
    <link rel="icon" type="image/x-icon" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            text-align: center;
            color: white;
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .search-box {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .search-box:focus {
            outline: none;
            background: white;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: white;
            color: var(--primary-color);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .quick-links {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .quick-links h3 {
            font-size: 18px;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        .quick-links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .quick-link-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
        }

        .quick-link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .quick-link-item i {
            margin-right: 8px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-message {
                font-size: 16px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .quick-links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">哎呀，页面走丢了！</h1>
        <p class="error-message">
            抱歉，您访问的页面不存在或已被移除。<br>
            别担心，我们可以帮您找到想去的地方。
        </p>

        <!-- 搜索框 -->
        <input type="text" class="search-box" id="searchInput" placeholder="搜索本站内容...">

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="/nav.html" class="btn btn-outline">
                <i class="fas fa-compass"></i> 网站导航
            </a>
        </div>

        <!-- 快速链接 -->
        <div class="quick-links">
            <h3>热门页面</h3>
            <div class="quick-links-grid">
                <a href="/" class="quick-link-item">
                    <i class="fas fa-home"></i> 首页
                </a>
                <a href="/nav.html" class="quick-link-item">
                    <i class="fas fa-th-large"></i> AI工具导航
                </a>
                <a href="/book.html" class="quick-link-item">
                    <i class="fas fa-book"></i> 图书推荐
                </a>
                <a href="/about.html" class="quick-link-item">
                    <i class="fas fa-user"></i> 关于我
                </a>
                <a href="/contact.html" class="quick-link-item">
                    <i class="fas fa-envelope"></i> 联系我
                </a>
                <a href="/blog/" class="quick-link-item">
                    <i class="fas fa-pen-nib"></i> 技术博客
                </a>
            </div>
        </div>
    </div>

    <script>
        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    // 跳转到导航页并执行搜索
                    window.location.href = `/nav.html?q=${encodeURIComponent(query)}`;
                }
            }
        });

        // 自动聚焦到搜索框
        window.onload = function() {
            searchInput.focus();
        };

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Alt + Home 返回首页
            if (e.altKey && e.key === 'Home') {
                window.location.href = '/';
            }
            // Alt + N 打开导航
            if (e.altKey && e.key === 'n') {
                window.location.href = '/nav.html';
            }
        });
    </script>
</body>
</html>
