    <script>
        // Category icons mapping
        const categoryIcons = {
            'main': { icon: 'fa-home', class: 'icon-main' },
            'common': { icon: 'fa-star', class: 'icon-common' },
            'ai-chat': { icon: 'fa-comments', class: 'icon-ai' },
            'ai-code': { icon: 'fa-code', class: 'icon-ai' },
            'ai-api': { icon: 'fa-plug', class: 'icon-ai' },
            'ai-search': { icon: 'fa-search', class: 'icon-ai' },
            'ai-office': { icon: 'fa-briefcase', class: 'icon-ai' },
            'ai-claw': { icon: 'fa-robot', class: 'icon-ai' },
            'python': { icon: 'fa-python', class: 'icon-python' },
            'learning': { icon: 'fa-graduation-cap', class: 'icon-learning' },
            'writing': { icon: 'fa-pen', class: 'icon-writing' },
            'tools': { icon: 'fa-tools', class: 'icon-tools' }
        };

        // Load and render navigation data
        document.addEventListener('DOMContentLoaded', function() {
            const navContainer = document.getElementById('nav-container');
            const searchInput = document.getElementById('searchInput');
            let navData = null;

            // Fetch navigation data
            fetch('data/nav.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('加载导航配置失败: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    navData = data;
                    renderNav(data.categories);
                })
                .catch(error => {
                    navContainer.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>导航数据加载失败，请刷新页面重试</p>
                        </div>
                    `;
                });

            // Search functionality
            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase().trim();
                if (!navData) return;

                if (searchTerm === '') {
                    renderNav(navData.categories);
                    return;
                }

                const filteredCategories = navData.categories.map(category => {
                    const filteredLinks = category.links.filter(link => 
                        link.name.toLowerCase().includes(searchTerm) ||
                        link.url.toLowerCase().includes(searchTerm)
                    );
                    return {
                        ...category,
                        links: filteredLinks
                    };
                }).filter(category => category.links.length > 0);

                if (filteredCategories.length === 0) {
                    navContainer.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <p>未找到匹配 "${escapeHtml(searchTerm)}" 的结果</p>
                        </div>
                    `;
                } else {
                    renderNav(filteredCategories);
                }
            });

            function renderNav(categories) {
                let html = '<div class="category-grid">';
                
                categories.forEach(function(category) {
                    const iconConfig = categoryIcons[category.id] || { icon: 'fa-folder', class: 'icon-main' };
                    
                    html += `
                        <div class="category-card" id="${escapeHtml(category.id)}">
                            <div class="category-header">
                                <div class="category-icon ${iconConfig.class}">
                                    <i class="fas ${iconConfig.icon}"></i>
                                </div>
                                <h2 class="category-title">${escapeHtml(category.name)}</h2>
                                <span class="category-count">${category.links.length}</span>
                            </div>
                            <div class="category-links">
                    `;
                    
                    category.links.forEach(function(link) {
                        const safeUrl = sanitizeUrl(link.url);
                        const safeName = escapeHtml(link.name);
                        html += `
                            <a href="${safeUrl}" 
                               target="_blank" 
                               rel="noopener noreferrer"
                               class="nav-link-item"
                               title="${safeName}">
                                ${safeName}
                            </a>
                        `;
                    });
                    
                    html += '</div></div>';
                });
                
                html += '</div>';
                navContainer.innerHTML = DOMPurify.sanitize(html, { ALLOWED_TAGS: ['div', 'a', 'h2', 'span', 'i'], ALLOWED_ATTR: ['class', 'id', 'href', 'target', 'rel', 'title'] });
            }
            
            function sanitizeUrl(url) {
                try {
                    const parsedUrl = new URL(url);
                    // 只允许 http 和 https 协议
                    if (parsedUrl.protocol !== 'http:' && parsedUrl.protocol !== 'https:') {
                        return '#';
                    }
                    return escapeHtml(url);
                } catch (e) {
                    return '#';
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        });
    </script>
