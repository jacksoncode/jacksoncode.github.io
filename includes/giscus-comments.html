<!-- 
Giscus 评论系统集成指南
用法：将此代码添加到博客文章页面底部

配置步骤:
1. 访问 https://giscus.app/zh-CN
2. 输入你的 GitHub 仓库信息
3. 获取配置代码
4. 替换下面的配置参数
-->

<div id="giscus-comments" style="margin-top: 60px;">
    <script src="https://giscus.app/client.js"
            data-repo="jacksoncode/jacksoncode.github.io"
            data-repo-id="YOUR_REPO_ID"
            data-category="General"
            data-category-id="YOUR_CATEGORY_ID"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
    </script>
</div>

<!--
暗色模式适配:
Giscus 会自动跟随系统的暗色模式偏好
如需自定义，修改 data-theme 参数:
- light: 亮色模式
- dark: 暗色模式  
- preferred_color_scheme: 跟随系统
- custom: 使用自定义主题

高级配置:
- data-mapping: 可使用 "title", "og:title", "number" 等
- data-theme: 支持自定义 CSS 主题
- data-strict: 严格匹配标题
-->
